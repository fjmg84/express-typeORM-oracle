services:
  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=oracle
      - DB_PORT=1521
      - DB_USER=app_user
      - DB_PASSWORD=apppassword
      - DB_SERVICE=XE
    depends_on:
      - oracle
    networks:
      - app-network

  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    platform: linux/amd64
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-apppassword}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

volumes:
  oracle_data:

networks:
  app-network:
    driver: bridge